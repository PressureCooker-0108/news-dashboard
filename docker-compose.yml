# ──────────────────────────────────────────────
# News Dashboard — Docker Compose
# ──────────────────────────────────────────────
# Start everything:
#   docker compose up -d
#
# View logs:
#   docker compose logs -f
#
# Stop:
#   docker compose down
# ──────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newsdash
      POSTGRES_PASSWORD: newsdash_dev_password
      POSTGRES_DB: newsdash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsdash"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://newsdash:newsdash_dev_password@postgres:5432/newsdash?sslmode=disable
      PORT: "8001"
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      PYTHONUNBUFFERED: "1"
      # No API_KEY set = dev mode (no auth on POST endpoints)
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (optional) ────────────────────
  # Uncomment to also serve the Next.js frontend via Docker.
  # Otherwise, run it locally with: cd frontend && npm run dev
  #
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8001
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  pgdata:
